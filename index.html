<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aravind's Snake App</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f3f4ef;
        color: #1d2a1d;
      }

      main {
        width: min(100%, 560px);
        background: #ffffff;
        border: 1px solid #b5bcab;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(29, 42, 29, 0.08);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Aravind's Snake App</h1>
      <p>This project now runs through the Python app server instead of a static page.</p>
      <p>Start it with <code>python app.py</code> and open <code>http://127.0.0.1:8000</code>.</p>
      <p>Build output is created with <code>python scripts/build.py</code>.</p>
    </main>
  </body>
</html>
